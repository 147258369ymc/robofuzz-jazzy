lock_schema: robofuzz-jazzy.targets.v1
generated_on: "2026-06-22"

image:
  tag: robofuzz-jazzy:latest
  base_image: ros:jazzy-ros-base-noble
  ubuntu: "24.04 noble"
  ros_distro: jazzy
  gazebo: harmonic

apt_packages:
  ros:
    - ros-jazzy-ros-gz
    - ros-jazzy-moveit
    - ros-jazzy-moveit-resources-panda-description
    - ros-jazzy-moveit-resources-panda-moveit-config
    - ros-jazzy-turtlebot4-simulator
    - ros-jazzy-irobot-create-nodes
  build:
    - build-essential
    - cmake
    - git
    - ninja-build
    - python3-colcon-common-extensions
    - python3-pip
    - python3-pytest
    - python3-rosdep
    - python3-vcstool
    - xvfb
  exact_version_resolution:
    status: pending_first_successful_image_build
    command: "dpkg-query -W 'ros-jazzy-*' build-essential cmake git ninja-build python3-colcon-common-extensions python3-pip python3-pytest python3-rosdep python3-vcstool"

python_packages:
  pinned:
    kconfiglib: "14.1.0"
    kinpy: "0.5.6"
    sysv-ipc: "1.1.0"
  resolve_in_image:
    - pymavlink
    - pyulog
  compatibility_notes:
    - "PX4 v1.17 CMake configuration imports menuconfig from kconfiglib; without this package, px4_sitl configuration fails before compilation."
    - "kinpy 0.1.0 is not used in the Jazzy image because its Python 3.12 dependency chain pulls PyYAML 5.4.1 and transformations 2020.1.1, which fail during source builds."
    - "kinpy 0.5.6 keeps the RoboFuzz-used FK APIs available: build_chain_from_urdf, build_serial_chain_from_urdf, forward_kinematics, and Transform.pos."

external_sources:
  px4_autopilot:
    repository: https://github.com/PX4/PX4-Autopilot.git
    tag: v1.17.0
    tag_object_sha: a5eb12d2ab591251faa009f76b2685b8cc64405d
    commit_sha: d6f12ad1c4f70ad3230afd7d86e971421e02fef4
    python_requirements: /robofuzz/targets/PX4-Autopilot/Tools/setup/requirements.txt
    build_dependency_note: "Install the PX4-tagged Python requirements before SITL smoke tests; px4_sitl generation needs pyros-genmsg/genmsg, jsonschema, empy<4, jinja2, kconfiglib, and related tooling."
  px4_msgs:
    repository: https://github.com/PX4/px4_msgs.git
    ref: release/1.17
    commit_sha: 86d8239e962f6939e05c3737784f60c02fa884db
    build_workspace: /robofuzz/px4_ros2_ws
    verification: "colcon build --symlink-install --packages-select px4_msgs"
  micro_xrce_dds_agent:
    repository: https://github.com/eProsima/Micro-XRCE-DDS-Agent.git
    tag: v2.4.3
    commit_sha: 73622810d984349b80bbac0ef55fc0b694d62222
    verification: "MicroXRCEAgent --help prints transport usage; the help command returns non-zero, so verify command presence separately."
    compatibility_note: "PX4 v1.17 uses Micro XRCE-DDS Client v2.x, so Micro XRCE-DDS Agent v3.x is intentionally not pinned here."
    build_notes:
      - "Build with UAGENT_SUPERBUILD=OFF against Jazzy system FastDDS/Fast-CDR so the normal install target is available."
      - "Disable UAGENT_LOGGER_PROFILE because v2.4.3 does not compile against Noble's system spdlog/fmt formatter checks."
      - "Disable UAGENT_P2P_PROFILE for the initial PX4 UDP agent use case; PX4 SITL smoke testing should validate this remains sufficient."
  moveit_resources:
    resolution: use_binary_ros_jazzy_moveit_resources_panda_config
    apt_packages:
      - ros-jazzy-moveit-resources-panda-description
      - ros-jazzy-moveit-resources-panda-moveit-config
    source_checkout_policy: none_for_initial_jazzy_image
  turtlebot4:
    resolution: use_binary_ros_jazzy_turtlebot4_simulator_first
    source_checkout_policy: add_only_if_binary_packages_fail
    launch_note: "Docker default uses split headless launch under xvfb-run because upstream turtlebot4_gz sim.launch.py hardcodes a Gazebo GUI config and TurtleBot4 sensors require a virtual display for server-side rendering; set TURTLEBOT4_HEADLESS=0 for the upstream launch path."

profiles:
  - target_profiles/turtlebot4_jazzy.yaml
  - target_profiles/px4_v117_jazzy.yaml
  - target_profiles/moveit2_jazzy.yaml
