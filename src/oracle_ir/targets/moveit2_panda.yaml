# MoveIt2 + Franka Emika Panda 目标描述符
# 匹配 RoboFuzz 容器中实际使用的 topic 名称 (moveit2_tutorials foxy branch)
name: moveit2_panda
display_name: "MoveIt2 + Franka Emika Panda 7-DOF"
version: "moveit2-2.2.3_panda-2.0.3"
middleware: ros2
description: "Franka Emika Panda 7自由度机械臂，通过 MoveIt2 move_group_interface 控制"

topic_suffix: ""

topics:
  - name: /joint_states
    msg_type: sensor_msgs/msg/JointState
    fields: [position, velocity, effort, name]
    field_units: {position: rad, velocity: rad/s, effort: Nm}
    frequency_hz: 100.0
    description: "7个关节 + 2个手指关节的实时状态"

  - name: /panda_arm_controller/state
    msg_type: control_msgs/msg/JointTrajectoryControllerState
    fields: [desired.positions, desired.velocities, actual.positions, actual.velocities, error.positions, error.velocities]
    field_units: {desired.positions: rad, actual.positions: rad, error.positions: rad, desired.velocities: rad/s, actual.velocities: rad/s}
    frequency_hz: 100.0
    description: "轨迹控制器状态：期望值、实际值、跟踪误差"

  - name: /move_action/_action/status
    msg_type: action_msgs/msg/GoalStatusArray
    fields: [status_list]
    field_units: {}
    frequency_hz: 10.0
    description: "MoveGroup action 执行状态 (2=executing, 4=succeeded, 6=aborted)"

  - name: /motion_plan_request
    msg_type: moveit_msgs/msg/MotionPlanRequest
    fields: [group_name, goal_constraints, path_constraints, planner_id, allowed_planning_time, max_velocity_scaling_factor, max_acceleration_scaling_factor]
    field_units: {allowed_planning_time: s}
    frequency_hz: 0.0
    description: "运动规划请求（含目标约束、路径约束、规划器参数）"

operating_modes:
  - name: idle
    description: "空闲（关节保持当前位置）"
  - name: planning
    description: "运动规划计算中"
  - name: executing
    description: "正在执行规划好的轨迹"
    active_topics: [/joint_states, /panda_arm_controller/state, /move_action/_action/status]
  - name: servo
    description: "实时伺服模式（低延迟连续控制）"
    active_topics: [/joint_states, /panda_arm_controller/state]

constraint_types:
  - category: joint_position
    description: "关节角度范围限制（硬限位 + 软限位）"
    relevant_topics: [/joint_states, /panda_arm_controller/state]
    param_patterns: [".*joint.*limit.*", ".*lower.*", ".*upper.*", ".*position.*"]
  - category: joint_velocity
    description: "关节角速度限制"
    relevant_topics: [/joint_states, /panda_arm_controller/state]
    param_patterns: [".*max_velocity.*", ".*velocity.*limit.*", ".*vel.*"]
  - category: joint_acceleration
    description: "关节加速度限制（由 jerk 约束推导）"
    relevant_topics: [/panda_arm_controller/state]
    param_patterns: [".*max_acceleration.*", ".*accel.*"]
  - category: joint_effort
    description: "关节力矩/力限制"
    relevant_topics: [/joint_states]
    param_patterns: [".*effort.*", ".*torque.*", ".*force.*"]
  - category: trajectory_tracking
    description: "轨迹跟踪精度（期望 vs 实际偏差）"
    relevant_topics: [/panda_arm_controller/state]
    param_patterns: [".*error.*", ".*tolerance.*", ".*tracking.*"]
  - category: workspace
    description: "工作空间边界和末端执行器可达性"
    relevant_topics: [/joint_states]
    param_patterns: [".*workspace.*", ".*reach.*", ".*range.*"]
  - category: planning_result
    description: "规划结果一致性（action status 与执行状态）"
    relevant_topics: [/move_action/_action/status, /motion_plan_request]
    param_patterns: [".*planning.*", ".*goal.*", ".*status.*"]

safety_conditions:
  - name: is_executing
    description: "机械臂正在执行轨迹"
    check_expr: "action_status == 2"
    required_topics: [/move_action/_action/status]
  - name: within_joint_limits
    description: "所有关节在软限位范围内"
    check_expr: "all_joints_within_soft_limits"
    required_topics: [/joint_states]
  - name: controller_active
    description: "轨迹控制器正在活跃输出"
    check_expr: "controller_state_received"
    required_topics: [/panda_arm_controller/state]

param_naming:
  joint_position_constraint:
    - ".*lower.*"
    - ".*upper.*"
    - ".*soft_lower.*"
    - ".*soft_upper.*"
    - ".*position.*limit.*"
  joint_velocity_constraint:
    - ".*max_velocity.*"
    - ".*has_velocity_limits.*"
  joint_acceleration_constraint:
    - ".*max_acceleration.*"
    - ".*has_acceleration_limits.*"
  effort_constraint:
    - ".*effort.*"
    - ".*torque.*"
  workspace_constraint:
    - ".*workspace.*"
    - ".*range.*"
    - ".*collision.*"
  singularity_constraint:
    - ".*singularity.*"
    - ".*condition.*number.*"
  planning_constraint:
    - ".*planning.*time.*"
    - ".*scaling.*factor.*"
    - ".*goal_bias.*"
