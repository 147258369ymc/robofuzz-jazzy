id: px4.fw.vertical_acceleration
type: range_bound
system: px4
version: a264541861

scope:
  require_airborne: true

observations:
  - name: az
    topic: /VehicleAcceleration_PubSubTopic
    field: xyz
    index: 2
    unit: m/s2

parameters:
  - name: FW_T_VERT_ACC
    source: px4.parameters
    unit: m/s^2
    default: 7.0

constants:
  - name: GRAVITY
    value: 9.81
    unit: m/s2

derived:
  - name: vertical_accel
    expr: "abs(az + GRAVITY)"
    unit: m/s2

assertions:
  - expr: "vertical_accel <= param(FW_T_VERT_ACC) + tolerance"
    tolerance: 1.0
    severity: warning
    message: "FW vertical accel {vertical_accel:.2f} exceeds FW_T_VERT_ACC"

window:
  type: every_sample
  filter: airborne

provenance:
  - chunk_id: px4.parameter.FW_T_VERT_ACC
    evidence: "Maximum vertical acceleration for fixed-wing TECS"
