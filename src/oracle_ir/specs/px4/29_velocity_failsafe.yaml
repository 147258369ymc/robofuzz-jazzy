id: px4.velocity.failsafe_threshold
type: range_bound
system: px4
version: a264541861

scope:
  require_airborne: true

observations:
  - name: vx
    topic: /VehicleLocalPosition_PubSubTopic
    field: vx
    unit: m/s
  - name: vy
    topic: /VehicleLocalPosition_PubSubTopic
    field: vy
    unit: m/s

parameters:
  - name: COM_VEL_FS_EVH
    source: px4.parameters
    unit: m/s
    default: 1.0

derived:
  - name: horizontal_velocity
    expr: "sqrt(vx * vx + vy * vy)"
    unit: m/s

assertions: []

window:
  type: every_sample
  filter: airborne

feedback:
  - name: velocity_error_horizontal
    metric: "horizontal_velocity"
    direction: maximize

provenance:
  - chunk_id: px4.parameter.COM_VEL_FS_EVH
    evidence: "Horizontal velocity error threshold for failsafe"
