id: px4.failure.attitude_limits
type: range_bound
system: px4
version: a264541861

scope:
  require_airborne: true

observations:
  - name: qw
    topic: /VehicleAttitude_PubSubTopic
    field: q
    index: 0
    unit: ""
  - name: qx
    topic: /VehicleAttitude_PubSubTopic
    field: q
    index: 1
    unit: ""
  - name: qy
    topic: /VehicleAttitude_PubSubTopic
    field: q
    index: 2
    unit: ""
  - name: qz
    topic: /VehicleAttitude_PubSubTopic
    field: q
    index: 3
    unit: ""

parameters:
  - name: FD_FAIL_R
    source: px4.parameters
    unit: deg
    default: 60.0
  - name: FD_FAIL_P
    source: px4.parameters
    unit: deg
    default: 60.0

derived:
  - name: roll_deg
    expr: "abs(degrees(2.0 * (qw * qx + qy * qz)))"
    unit: deg
  - name: pitch_sin
    expr: "max(-1.0, min(1.0, 2.0 * (qw * qy - qz * qx)))"
    unit: ""
  - name: pitch_deg
    expr: "abs(degrees(pitch_sin))"
    unit: deg

assertions:
  - expr: "roll_deg <= param(FD_FAIL_R) + tolerance"
    tolerance: 5.0
    severity: error
    message: "FailureDetector roll {roll_deg:.1f} exceeds FD_FAIL_R"
  - expr: "pitch_deg <= param(FD_FAIL_P) + tolerance"
    tolerance: 5.0
    severity: error
    message: "FailureDetector pitch {pitch_deg:.1f} exceeds FD_FAIL_P"

window:
  type: every_sample
  filter: airborne

provenance:
  - chunk_id: px4.parameter.FD_FAIL_R
    evidence: "FailureDetector Max Roll"
  - chunk_id: px4.parameter.FD_FAIL_P
    evidence: "FailureDetector Max Pitch"
