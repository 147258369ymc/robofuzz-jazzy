id: px4.velocity.manual_xy
type: range_bound
system: px4
version: a264541861

scope:
  flight_modes: [MANUAL, ALTCTL, POSCTL]
  require_airborne: true

observations:
  - name: vx
    topic: /VehicleLocalPosition_PubSubTopic
    field: vx
    unit: m/s
  - name: vy
    topic: /VehicleLocalPosition_PubSubTopic
    field: vy
    unit: m/s

parameters:
  - name: MPC_VEL_MANUAL
    source: px4.parameters
    unit: m/s
    default: 10.0

derived:
  - name: horizontal_velocity
    expr: "sqrt(vx * vx + vy * vy)"
    unit: m/s

assertions:
  - expr: "horizontal_velocity <= param(MPC_VEL_MANUAL) + tolerance"
    tolerance: 0.5
    severity: error
    message: "MPC_VEL_MANUAL violated: {horizontal_velocity:.2f} m/s"

window:
  type: every_sample
  filter: airborne

provenance:
  - chunk_id: px4.parameter.MPC_VEL_MANUAL
    evidence: "Maximum horizontal velocity setpoint for manual controlled mode"
