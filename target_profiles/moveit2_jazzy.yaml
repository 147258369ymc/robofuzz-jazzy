schema_version: 1
name: moveit2_jazzy
display_name: MoveIt2 Jazzy Panda
status: launch_smoke_verified

environment:
  ubuntu: "24.04"
  ros_distro: jazzy
  gazebo: harmonic

packages:
  apt:
    - ros-jazzy-moveit
    - ros-jazzy-moveit-resources-panda-description
    - ros-jazzy-moveit-resources-panda-moveit-config

target:
  family: moveit
  robot: panda
  planner: move_group

launch:
  adapter: ros2_launch
  package: moveit_resources_panda_moveit_config
  launch_file: demo.launch.py
  args:
    ros2_control_hardware_type: mock_components
  command:
    - ros2
    - launch
    - moveit_resources_panda_moveit_config
    - demo.launch.py
  note: Jazzy apt does not provide moveit2_tutorials as a binary package; the Panda demo assets are supplied by moveit_resources_panda_moveit_config.

readiness:
  required_log_patterns:
    - "You can start planning now!"
    - "Configured and activated panda_arm_controller"
  required_actions:
    /move_action: moveit_msgs/action/MoveGroup
    /panda_arm_controller/follow_joint_trajectory: control_msgs/action/FollowJointTrajectory
  notes:
    - MoveIt topic/action readiness is not enough after per-round restarts because ROS graph discovery can briefly expose stale endpoints; wait for current-launch log markers before checking graph readiness and sending fuzz goals.

input:
  mode: motion_plan_request
  topic: /motion_plan_request
  type: moveit_msgs/msg/MotionPlanRequest
  command_function: harness.moveit_send_command

watch:
  required:
    /joint_states: sensor_msgs/msg/JointState
    /panda_arm_controller/controller_state: control_msgs/msg/JointTrajectoryControllerState
  expected_after_planning:
    /motion_plan_request: moveit_msgs/msg/MotionPlanRequest
    /move_action/_action/status: action_msgs/msg/GoalStatusArray
  optional:
    /robofuzz/moveit_result_code: std_msgs/msg/Int32
    /robofuzz/moveit_goal_event: std_msgs/msg/String
  compatibility_notes:
    - Jazzy Panda resources expose /panda_arm_controller/controller_state instead of the Foxy-era /panda_arm_controller/state.
    - Hidden action status topics should be inspected with "ros2 topic list --include-hidden-topics" during smoke tests.

oracle:
  module: oracles.moveit
  mode: moveit2_jazzy
  status: preserve_current_improvements
  preserved_behaviors:
    - error_signature_deduplication
    - process_group_cleanup
    - endpoint_checking_via_last_motion_plan_request
    - controller_state_fk
    - velocity_and_acceleration_tolerance_ratios
    - reachable_region_mutation
    - orientation_mutation

aliases:
  keep:
    - --test-moveit
