schema_version: 1
name: turtlebot4_jazzy
display_name: TurtleBot4 Jazzy
status: tested

environment:
  ubuntu: "24.04"
  ros_distro: jazzy
  gazebo: harmonic

packages:
  apt:
    - ros-jazzy-turtlebot4-simulator
    - ros-jazzy-irobot-create-nodes

target:
  family: turtlebot
  generation: turtlebot4
  default_model: standard
  supported_models:
    - standard
    - lite

launch:
  adapter: split_headless_ros_gz_launch
  package: turtlebot4_gz_bringup
  launch_file: turtlebot4_gz.launch.py
  args:
    headless: true
    model: standard
    gazebo: ignition
    rviz: false
    gz_args: "-s -r"
    xvfb: true
    world: warehouse
  command:
    - ./run_target.sh
    - turtlebot4_jazzy
  compatibility_note: The upstream turtlebot4_gz.launch.py path remains available with TURTLEBOT4_HEADLESS=0, but the Docker default uses split headless launch with xvfb-run because the upstream sim.launch.py hardcodes a Gazebo GUI config and TurtleBot4 sensors still require a virtual display for server-side rendering.

readiness:
  required_log_patterns:
    - "Turtlebot4 standard running."
    - "Configured and activated diffdrive_controller"
  required_topics_with_data:
    /odom: nav_msgs/msg/Odometry
  compatibility_note: >
    TurtleBot4 bring-up can advertise topics before sensors and odometry are
    publishing useful samples. Use a stable TurtleBot4 node log marker plus
    the diffdrive activation marker for launch liveness, then require live
    /odom samples before fuzzing. /scan remains a watched oracle topic, but it
    is not a startup readiness gate because minimal debug worlds can advertise
    /scan before useful laser samples arrive.


input:
  mode: velocity_command
  preferred:
    topic: /cmd_vel
    type: geometry_msgs/msg/TwistStamped
  fallback:
    topic: /cmd_vel
    type: geometry_msgs/msg/Twist
  compatibility_note: Use Twist only if graph inspection shows the Jazzy stack exposes no stamped command endpoint.

watch:
  required:
    /odom: nav_msgs/msg/Odometry
    /scan: sensor_msgs/msg/LaserScan
  optional:
    /hazard_detection: irobot_create_msgs/msg/HazardDetectionVector
    /slip_status: irobot_create_msgs/msg/SlipStatus
    /stall_status: irobot_create_msgs/msg/WheelStatus
    /kidnap_status: irobot_create_msgs/msg/KidnapStatus
    /wheel_status: irobot_create_msgs/msg/WheelStatus
    /interface_buttons: irobot_create_msgs/msg/InterfaceButtons
    /wheel_ticks: irobot_create_msgs/msg/WheelTicks
    /wheel_vels: irobot_create_msgs/msg/WheelVels

oracle:
  module: oracles.turtlebot
  mode: turtlebot4_jazzy
  status: verified
  initial_properties:
    - existential_topics_present
    - command_odom_consistency
    - sensor_range_sanity
    - hazard_reflex_consistency
    - velocity_envelope_from_runtime_parameters
  threshold_policy: Derive thresholds from TurtleBot4/Create3 documentation, runtime parameters, or measured Jazzy baseline behavior.

aliases:
  add:
    - --tb4-sitl
  do_not_map:
    - --tb3-sitl
