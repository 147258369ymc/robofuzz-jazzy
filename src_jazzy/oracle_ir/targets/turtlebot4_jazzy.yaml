# TurtleBot4 Jazzy target descriptor for OracleIR agent generation.
name: turtlebot4_jazzy
display_name: "TurtleBot4 Jazzy Standard + Create3"
version: "turtlebot4-jazzy-runtime-clean"
middleware: ros2
description: "TurtleBot4 Standard simulation on ROS 2 Jazzy with Gazebo Harmonic, Create3 nodes, TwistStamped /cmd_vel, and runtime-locked RoboFuzz turtlebot4_jazzy profile."

topic_suffix: ""

topics:
  - name: /cmd_vel
    msg_type: geometry_msgs/msg/TwistStamped
    fields: [header.stamp, twist.linear.x, twist.linear.y, twist.linear.z, twist.angular.x, twist.angular.y, twist.angular.z]
    field_units:
      twist.linear.x: m/s
      twist.angular.z: rad/s
    frequency_hz: 1.0
    description: "Canonical Jazzy RoboFuzz input topic; bridged to diffdrive_controller/cmd_vel."

  - name: /cmd_vel_unstamped
    msg_type: geometry_msgs/msg/Twist
    fields: [linear.x, linear.y, linear.z, angular.x, angular.y, angular.z]
    field_units:
      linear.x: m/s
      angular.z: rad/s
    frequency_hz: 0.0
    description: "Compatibility fallback only; the turtlebot4_jazzy profile prefers /cmd_vel TwistStamped."

  - name: /diffdrive_controller/cmd_vel
    msg_type: geometry_msgs/msg/TwistStamped
    fields: [header.stamp, twist.linear.x, twist.angular.z]
    field_units:
      twist.linear.x: m/s
      twist.angular.z: rad/s
    frequency_hz: 62.0
    description: "Controller-side bridged velocity command path. Prefer /cmd_vel for Phase-1 executable OracleIR unless the target profile explicitly records this controller-side topic."

  - name: /odom
    msg_type: nav_msgs/msg/Odometry
    fields: [header.stamp, pose.pose.position.x, pose.pose.position.y, pose.pose.orientation.z, pose.pose.orientation.w, twist.twist.linear.x, twist.twist.angular.z]
    field_units:
      pose.pose.position.x: m
      pose.pose.position.y: m
      twist.twist.linear.x: m/s
      twist.twist.angular.z: rad/s
    frequency_hz: 62.0
    description: "DiffDriveController odometry; primary state topic for command/odom consistency."

  - name: /scan
    msg_type: sensor_msgs/msg/LaserScan
    fields: [header.stamp, angle_min, angle_max, angle_increment, range_min, range_max, ranges]
    field_units:
      angle_min: rad
      angle_max: rad
      range_min: m
      range_max: m
      ranges: m
    frequency_hz: 62.0
    description: "RPLIDAR scan from Gazebo gpu_lidar. Runtime range envelope is 0.164 m to 12.0 m; +inf is valid for no return."

  - name: /hazard_detection
    msg_type: irobot_create_msgs/msg/HazardDetectionVector
    fields: [header.stamp, detections]
    field_units: {}
    frequency_hz: 0.0
    description: "Create3 hazard vector aggregating bumper, cliff, wheel-drop and other reflex-related events."

  - name: /slip_status
    msg_type: irobot_create_msgs/msg/SlipStatus
    fields: [header.stamp, is_slip, left_wheel_distance, right_wheel_distance]
    field_units:
      left_wheel_distance: m
      right_wheel_distance: m
    frequency_hz: 0.0
    description: "Create3 slip state when available."

  - name: /kidnap_status
    msg_type: irobot_create_msgs/msg/KidnapStatus
    fields: [header.stamp, is_kidnapped]
    field_units: {}
    frequency_hz: 0.0
    description: "Create3 kidnap/lift state."

  - name: /wheel_status
    msg_type: irobot_create_msgs/msg/WheelStatus
    fields: [header.stamp, current_ma_left, current_ma_right, pwm_left, pwm_right]
    field_units:
      current_ma_left: mA
      current_ma_right: mA
    frequency_hz: 0.0
    description: "Create3 wheel current and status diagnostics."

  - name: /wheel_ticks
    msg_type: irobot_create_msgs/msg/WheelTicks
    fields: [header.stamp, ticks_left, ticks_right]
    field_units: {}
    frequency_hz: 0.0
    description: "Create3 wheel encoder ticks."

  - name: /wheel_vels
    msg_type: irobot_create_msgs/msg/WheelVels
    fields: [header.stamp, velocity_left, velocity_right]
    field_units:
      velocity_left: rad/s
      velocity_right: rad/s
    frequency_hz: 0.0
    description: "Create3 wheel velocity diagnostics."

  - name: /clock
    msg_type: rosgraph_msgs/msg/Clock
    fields: [clock.sec, clock.nanosec]
    field_units:
      clock.sec: s
      clock.nanosec: ns
    frequency_hz: 0.0
    description: "Gazebo simulation clock. Required for stable controller startup and timestamp interpretation."

operating_modes:
  - name: idle
    description: "Gazebo and Create3 nodes are active, but RoboFuzz is not issuing a nonzero velocity command."
    active_topics: [/odom, /scan, /clock]
  - name: safety_enabled_motion
    description: "Default Create3 safety behavior is enabled; commanded speed may be bounded below the full controller limits."
    active_topics: [/cmd_vel, /odom, /scan, /hazard_detection, /wheel_status, /wheel_vels]
  - name: reflex_limited_motion
    description: "Hazard, cliff, slip, kidnap, or wheel status indicates Create3 reflex logic may override or limit user motion."
    active_topics: [/cmd_vel, /odom, /hazard_detection, /slip_status, /kidnap_status, /wheel_status]
  - name: docking_environment
    description: "Standard model includes the default dock in the simulation world."
    active_topics: [/scan, /hazard_detection]

constraint_types:
  - category: velocity
    description: "Commanded and observed differential-drive linear/angular velocity envelopes."
    relevant_topics: [/cmd_vel, /odom, /diffdrive_controller/cmd_vel]
    param_patterns: [".*max_velocity.*", ".*min_velocity.*", ".*cmd_vel.*", ".*speed.*", ".*velocity.*"]
  - category: acceleration
    description: "Linear and angular acceleration limits derived from controller params and odometry deltas."
    relevant_topics: [/odom, /wheel_vels]
    param_patterns: [".*max_acceleration.*", ".*min_acceleration.*", ".*accel.*"]
  - category: scan_range
    description: "LaserScan finite ranges must be within runtime range_min/range_max; +inf is valid no-return."
    relevant_topics: [/scan]
    param_patterns: [".*range_min.*", ".*range_max.*", ".*scan.*", ".*lidar.*", ".*rplidar.*"]
  - category: hazard_reflex
    description: "Create3 hazard/reflex state should be consistent with bumper/cliff/proximity topics and command limiting."
    relevant_topics: [/hazard_detection, /slip_status, /kidnap_status, /wheel_status, /odom, /cmd_vel]
    param_patterns: [".*hazard.*", ".*cliff.*", ".*bumper.*", ".*slip.*", ".*kidnap.*", ".*wheel_drop.*", ".*reflex.*"]
  - category: wheel_state
    description: "Wheel ticks, wheel velocities, odometry and command direction consistency."
    relevant_topics: [/wheel_ticks, /wheel_vels, /wheel_status, /odom]
    param_patterns: [".*wheel.*", ".*ticks.*", ".*velocity_left.*", ".*velocity_right.*"]
  - category: temporal
    description: "Command timeout, simulation clock readiness, timestamp monotonicity and stale command behavior."
    relevant_topics: [/clock, /cmd_vel, /odom, /scan]
    param_patterns: [".*timeout.*", ".*publish_rate.*", ".*update_rate.*", ".*stamp.*", ".*clock.*"]

safety_conditions:
  - name: clock_ready
    description: "Simulation clock is publishing and advancing before controller-derived state is trusted."
    check_expr: "clock_received_and_monotonic"
    required_topics: [/clock]
  - name: odom_ready
    description: "DiffDriveController publishes odometry samples for command/odom consistency checks."
    check_expr: "odom_received"
    required_topics: [/odom]
  - name: scan_ready
    description: "RPLIDAR scan data is available and finite ranges respect runtime range bounds."
    check_expr: "scan_received"
    required_topics: [/scan]
  - name: safety_enabled_motion
    description: "Default Create3 safety envelope applies unless runtime metadata proves safety_override=full."
    check_expr: "safety_override != full"
    required_topics: [/cmd_vel, /odom]
  - name: no_active_reflex
    description: "No hazard/reflex state is currently limiting motion."
    check_expr: "hazard_detection_empty and not slip_status and not kidnap_status"
    required_topics: [/hazard_detection]

param_naming:
  velocity_constraint:
    - ".*max_velocity.*"
    - ".*min_velocity.*"
    - ".*velocity.*limit.*"
    - ".*speed.*envelope.*"
  acceleration_constraint:
    - ".*max_acceleration.*"
    - ".*min_acceleration.*"
    - ".*acceleration.*limit.*"
    - ".*wheel.*accel.*"
  cmd_odom_consistency:
    - ".*cmd_vel.*"
    - ".*command_odom.*"
    - ".*odom.*consistency.*"
    - ".*twist.*linear.*"
    - ".*twist.*angular.*"
  scan_range_constraint:
    - ".*range_min.*"
    - ".*range_max.*"
    - ".*rplidar.*"
    - ".*laser.*scan.*"
    - ".*scan.*range.*"
  hazard_reflex_constraint:
    - ".*hazard.*"
    - ".*reflex.*"
    - ".*cliff.*"
    - ".*bumper.*"
    - ".*slip.*"
    - ".*kidnap.*"
    - ".*wheel_drop.*"
  wheel_velocity_constraint:
    - ".*wheel_vel.*"
    - ".*wheel.*velocity.*"
    - ".*wheel_ticks.*"
    - ".*left_wheel.*"
    - ".*right_wheel.*"
  temporal_constraint:
    - ".*cmd_vel_timeout.*"
    - ".*publish_rate.*"
    - ".*update_rate.*"
    - ".*clock.*"
    - ".*stamp.*"
  docking_constraint:
    - ".*dock.*"
    - ".*undock.*"

generation_rules:
  - "Phase-1 executable OracleIR must use topics recorded by the turtlebot4_jazzy profile: /cmd_vel, /odom, /scan, /wheel_vels, /wheel_ticks, /wheel_status, /hazard_detection, /slip_status, /kidnap_status, and /clock if the profile includes it."
  - "For commanded velocity bounds, prefer /cmd_vel TwistStamped fields twist.linear.x and twist.angular.z. Do not use /diffdrive_controller/cmd_vel unless the spec explicitly requires a watchlist extension."
  - "For odometry response velocity bounds, use /odom twist.twist.linear.x and twist.twist.angular.z with tolerance derived from TurtleBot4/Create3 runtime baseline."
  - "加速度和 jerk 约束必须使用相邻样本差分: window.type: sequential_pairs, derived expr: (value - prev_value) / dt. 禁止把 /odom 的 velocity 字段直接与 acceleration 参数比较。"
  - "Boolean/interface parameters such as use_stamped_vel and enable_stamped_cmd_vel should generate validity or interface-consistency specs, not range_bound numeric specs."
  - "Wheel radius multiplier specs must relate /wheel_vels or /wheel_ticks to /odom motion if used as runtime oracles; a static positivity check alone is not useful fuzz feedback."
  - "LaserScan range_min/range_max are sensor metadata. Docking constants such as DOCKED_DISTANCE, DOCK_BUOYS_RANGE_, and DOCK_HALO_RANGE_ must not be compared directly against scan.range_min or scan.range_max as if they were observed obstacle distances."
  - "Feedback should guide fuzzing toward boundaries: minimize remaining margins such as limit - abs(observed), or maximize observed pressure/ratio such as abs(observed)/limit."
