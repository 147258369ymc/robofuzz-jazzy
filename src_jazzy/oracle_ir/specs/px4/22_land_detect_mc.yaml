id: px4.land_detect.multicopter
type: range_bound
system: px4
version: a264541861

scope:
  require_airborne: false

observations:
  - name: vx
    topic: /VehicleLocalPosition_PubSubTopic
    field: vx
    unit: m/s
  - name: vy
    topic: /VehicleLocalPosition_PubSubTopic
    field: vy
    unit: m/s
  - name: vz
    topic: /VehicleLocalPosition_PubSubTopic
    field: vz
    unit: m/s

parameters:
  - name: LNDMC_XY_VEL_MAX
    source: px4.parameters
    unit: m/s
    default: 1.5
  - name: LNDMC_Z_VEL_MAX
    source: px4.parameters
    unit: m/s
    default: 0.5

derived:
  - name: horizontal_velocity
    expr: "sqrt(vx * vx + vy * vy)"
    unit: m/s
  - name: climb_rate
    expr: "abs(vz)"
    unit: m/s

assertions: []

window:
  type: every_sample

feedback:
  - name: land_detect_xy_vel
    metric: "horizontal_velocity"
    direction: maximize
    min_threshold: 0.1
  - name: land_detect_z_vel
    metric: "climb_rate"
    direction: maximize
    min_threshold: 0.05

provenance:
  - chunk_id: px4.parameter.LNDMC_XY_VEL_MAX
    evidence: "Multicopter max horizontal velocity for land detection"
  - chunk_id: px4.parameter.LNDMC_Z_VEL_MAX
    evidence: "Multicopter max climb rate for land detection"
