id: px4.velocity.cruise_xy
type: range_bound
system: px4
version: a264541861

scope:
  flight_modes: [AUTO_MISSION, AUTO_LOITER, AUTO_RTL]
  require_airborne: true

observations:
  - name: vx
    topic: /VehicleLocalPosition_PubSubTopic
    field: vx
    unit: m/s
  - name: vy
    topic: /VehicleLocalPosition_PubSubTopic
    field: vy
    unit: m/s

parameters:
  - name: MPC_XY_CRUISE
    source: px4.parameters
    unit: m/s
    default: 5.0

derived:
  - name: horizontal_velocity
    expr: "sqrt(vx * vx + vy * vy)"
    unit: m/s

assertions:
  - expr: "horizontal_velocity <= param(MPC_XY_CRUISE) + tolerance"
    tolerance: 1.0
    severity: warning
    message: "MPC_XY_CRUISE exceeded: {horizontal_velocity:.2f} m/s"

window:
  type: every_sample
  filter: airborne

provenance:
  - chunk_id: px4.parameter.MPC_XY_CRUISE
    evidence: "Maximum horizontal velocity in mission"
